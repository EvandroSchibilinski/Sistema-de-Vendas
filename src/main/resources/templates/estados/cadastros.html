<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cadastro de Estado — Simplex</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background-color: #f5f5f5; }
    .card-form { max-width: 540px; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid px-3">
    <img src="/logo/logo.png" width="40" height="40" class="me-2 rounded" alt="Logo">
    <a class="navbar-brand" href="#">Simplex Sistemas</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link active" href="#">Home</a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Menu</a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#">Ação</a></li>
            <li><a class="dropdown-item" href="#">Outra ação</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="#">Algo mais</a></li>
          </ul>
        </li>
      </ul>
      <form class="d-flex">
        <input class="form-control me-2" type="search" placeholder="Pesquisar...">
        <button class="btn btn-outline-light" type="submit">Pesquisar</button>
      </form>
    </div>
  </div>
</nav>

<div class="container py-4">

  <!-- Breadcrumb -->
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="/administrativo">Home</a></li>
      <li class="breadcrumb-item active">Cadastro de Estado</li>
    </ol>
  </nav>

  <!-- Card do formulário -->
  <div class="card shadow-sm card-form">
    <div class="card-header d-flex align-items-center gap-2 py-3">
      <div class="d-flex align-items-center justify-content-center rounded"
           style="width:32px;height:32px;background:#e7f0ff;">
        <i class="fa-solid fa-location-dot text-primary"></i>
      </div>
      <span class="fw-semibold">Cadastro de Estado</span>
    </div>

    <div class="card-body">
      <form th:action="@{/salvarEstado}"
            th:object="${estado}"
            method="post">

        <div class="mb-3">
          <label for="id" class="form-label text-muted small">ID</label>
          <input type="text" readonly class="form-control form-control-sm bg-light"
                 id="id" th:field="*{id}" placeholder="Gerado automaticamente">
          <div class="form-text">Preenchido automaticamente pelo sistema.</div>
        </div>

        <div class="mb-3">
          <label for="nome" class="form-label">Nome do Estado <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="nome"
                 th:field="*{nome}" placeholder="Ex: São Paulo" required>
        </div>

        <div class="mb-3">
          <label for="sigla" class="form-label">Sigla <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="sigla"
                 th:field="*{sigla}" placeholder="Ex: SP"
                 maxlength="2" style="max-width: 100px;" required>
          <div class="form-text">Máximo 2 letras.</div>
        </div>

        <hr class="my-3">

        <div class="d-flex gap-2 justify-content-end">
          <a href="/administrativo" class="btn btn-outline-secondary">
            <i class="fa-solid fa-arrow-left me-1"></i> Voltar
          </a>
          <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-floppy-disk me-1"></i> Salvar
          </button>
        </div>

      </form>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
